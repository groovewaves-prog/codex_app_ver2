# R-M Phase 1 シード辞書
#
# 構造:
#   phrases:        完全一致で検出する公知エンティティ
#   token_patterns: spaCy native token pattern の脱出ハッチ
#
# label は spaCy 語彙のみ許可: ORG / GPE / FAC / PERSON
# 既存マスクカテゴリへのマップは ner_masker.py 側のコード固定マッピング。
#
# canonical (任意): 別名統合用。指定時は台帳の value としてこれを使う。
# 例: "日立" を "日立製作所" として正規化したい場合。
#
# Phase 1 方針 (handoff 判断 2):
# - 含める: 公知日本企業 (大手キャリア、大手IT、銀行、SIer、製造業大手、
#   官公庁など)
# - 含めない: AWS / Google / Microsoft 等の海外 IT 大手
#   → 技術文書中の正当な参照 (例: "AWS で構築") をマスクすると
#     LLM レビュー品質が大幅に低下するため
# - 含めない: 顧客固有名・案件名 → リポジトリ公開リスクのため
# - 含めない: マイナー企業 → HojinLookup (gBizINFO) 経由でユーザ判断 UI へ
#
# このファイルへの追加・削除は気軽に行ってよい (シード辞書は再起動毎に
# 読み直されるため、本番運用中も差分マージで反映可能)。

phrases:
  # ----- メガキャリア / 通信 -----
  - text: "KDDI"
    label: ORG
  - text: "NTT"
    label: ORG
  - text: "NTTドコモ"
    label: ORG
