# ---------- AWS 公式サービスを「Amazon X」「AWS X」のプレフィックス付きで参照する形 ----------
# 設計書では「Amazon SES」「Amazon VPC」のように Amazon プレフィックス付きで
# 書かれることが多いが、spaCy はこの 2 トークンをまとめて 1 ORG として
# 検出する。R-O ではパターンマッチでも拾えるが、完全一致 allowlist にも
# 主要なものを並べておくと、PR-G 経路で短絡的に弾けてパフォーマンスが上がる。
aws_prefixed_services:
  - "Amazon SES"
  - "Amazon VPC"
  - "Amazon S3"
